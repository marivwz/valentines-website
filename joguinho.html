<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>joguinho</title>
  <link rel="icon" type="image/png" href="./pics/gatinhos.png">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,700;1,300;1,400;1,700&family=DM+Sans:wght@300;400;500&family=Bebas+Neue&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="joguinho.css" />
</head>
<body>

<div class="bg-stars" id="bgStars"></div>

<header>
  <h1> Gatinhos da Krets </h1>
  <p>cuide dos bebês com muito amor puq é a gnt</p>
</header>

<div class="game">

  <div class="cat-selector">
    <button class="cat-sel-btn active" onclick="selectCat(0)">₍^. .^₎Ⳋ Kéh </button>
    <button class="cat-sel-btn"       onclick="selectCat(1)">₍^. .^₎Ⳋ Mari </button>
    <button class="cat-sel-btn"       onclick="selectCat(-1)">Ver as duas </button>
  </div>

  <div class="stage" id="stage">

    <div class="cat-wrap" id="cat0" onclick="petCat(0)" title="Clique para dar carinho!">
      <div class="cat-mood" id="mood0">₍^. .^₎Ⳋ</div>
      <div style="position:relative;">
        <img class="cat-sprite"
          src="pics/kretsgatinho-removebg-preview.png"
          alt="Krets" />
      </div>
      <div class="cat-name">Keh</div>
      <span class="zzz" id="zzz0">💤</span>
    </div>

    <!-- Gatinho 1 — mari (preta) -->
    <div class="cat-wrap" id="cat1" onclick="petCat(1)" title="Clique para dar carinho!">
      <div class="cat-mood" id="mood1">₍^. .^₎Ⳋ</div>
      <div style="position:relative;">
        <img class="cat-sprite"
          src="pics/marigatinho-removebg-preview.png"
          alt="Mari" />
      </div>
      <div class="cat-name">mari</div>
      <span class="zzz" id="zzz1">💤</span>
    </div>

  </div>

  <div class="stats-grid" id="statsGrid">
  </div>

  <div class="actions">
    <button class="action-btn" onclick="doAction('food')">
      <span class="icon">🍣</span>
      <span class="label">Comida</span>
    </button>
    <button class="action-btn" onclick="doAction('love')">
      <span class="icon">💜</span>
      <span class="label">Carinho</span>
    </button>
    <button class="action-btn" onclick="doAction('bath')">
      <span class="icon">🛁</span>
      <span class="label">Banho</span>
    </button>
    <button class="action-btn" onclick="doAction('play')">
      <span class="icon">🎾</span>
      <span class="label">Brincar</span>
    </button>
  </div>

  <div class="log" id="log">
    <div class="log-entry"> Bem-vinda! Seus gatinhos estão esperando por você~</div>
  </div>

</div>

<div class="toast" id="toast"></div>

<script src="joguinho.js"></script>
</body>
</html>
